<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Contribution Tracker</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#1e3c72,#2a5298);
            overflow:hidden;
        }

        /* Animated Background Circles */

        .circle{
            position:absolute;
            border-radius:50%;
            background:rgba(255,255,255,0.1);
            animation: float 8s infinite ease-in-out;
        }

        .circle:nth-child(1){
            width:200px;
            height:200px;
            top:10%;
            left:10%;
        }

        .circle:nth-child(2){
            width:300px;
            height:300px;
            bottom:10%;
            right:10%;
            animation-duration:10s;
        }

        @keyframes float{
            0%{
                transform:translateY(0px);
            }
            50%{
                transform:translateY(-20px);
            }
            100%{
                transform:translateY(0px);
            }
        }

        /* Login Card */

        .login-container{
            position:relative;
            z-index:2;
            width:400px;
            padding:40px;
            background:rgba(255,255,255,0.12);
            border-radius:20px;
            backdrop-filter: blur(10px);
            box-shadow:0 8px 32px rgba(0,0,0,0.3);
            text-align:center;
            color:white;
        }

        .logo{
            font-size:60px;
            margin-bottom:10px;
        }

        h1{
            margin-bottom:10px;
            font-size:32px;
        }

        p{
            margin-bottom:30px;
            color:#ddd;
        }

        input{
            width:100%;
            padding:14px;
            margin:10px 0;
            border:none;
            border-radius:10px;
            outline:none;
            font-size:16px;
        }

        button{
            width:100%;
            padding:14px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            background:#00c6ff;
            background:linear-gradient(to right,#0072ff,#00c6ff);
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.05);
        }

        .error{
            color:#ffb3b3;
            margin-top:15px;
            font-weight:bold;
        }

        .footer{
            margin-top:20px;
            font-size:14px;
            color:#ddd;
        }

    </style>

</head>
<body>

    <!-- Background Animation -->

    <div class="circle"></div>
    <div class="circle"></div>

    <!-- Login Card -->

    <div class="login-container">

        <div class="logo">🤖</div>

        <h1>AI Contribution Tracker</h1>

        <p>Smart Group Project Monitoring System</p>

        <form action="/login" method="POST">

            <input 
                type="text" 
                name="username" 
                placeholder="Enter Username"
                required
            >

            <input 
                type="password" 
                name="password" 
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        {% if error %}
            <div class="error">
                Invalid Username or Password
            </div>
        {% endif %}

        <div class="footer">
            Developed using Flask & Python
        </div>

    </div>

</body>
</html>
