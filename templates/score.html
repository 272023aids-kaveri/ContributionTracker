<!DOCTYPE html>
<html>

<head>
    <title>Score Page</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f6f9;
            padding:40px;
            text-align:center;
        }

        .box{
            background:white;
            width:70%;
            margin:auto;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            color:#1e3a8a;
        }

        button{
            padding:12px 25px;
            font-size:18px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>AI Contribution Report</h1>

        <p>
            Smart Group Contribution Analysis
        </p>

        <br>

        <a href="/download_pdf">
            <button>Download PDF Report</button>
        </a>

    </div>

</body>
</html>
